spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  # 테스트에서는 @MockitoBean StringRedisTemplate으로 덮어씀 — 실제 Redis 연결 불필요
  data:
    redis:
      host: localhost
      port: 6370  # dummy port

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: profile, email
          kakao:
            client-id: test-kakao-client-id           # dummy
            client-secret: test-kakao-client-secret   # dummy
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

oauth2:
  redirect-url: http://localhost:3000/oauth2/callback

management:
  health:
    redis:
      enabled: false
