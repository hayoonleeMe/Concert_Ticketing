spring:
  profiles:
    active: dev

  application:
    name: concert-ticketing

  config:
    import: optional:file:.env[.properties]

  jpa:
    open-in-view: false          # OSIV 비활성화 (성능, 명확한 트랜잭션 경계)
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100  # N+1 방지 IN 쿼리 배치 크기

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized

jwt:
  secret: ${JWT_SECRET}            # 256비트(32바이트) 이상 Base64 인코딩 값, .env에서 주입
  access-token-expiry: 1800000     # 30분 (ms)
  refresh-token-expiry: 604800000  # 7일 (ms) — Phase 4 Refresh Token 발급 시 사용

logging:
  level:
    com.concertticket: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
